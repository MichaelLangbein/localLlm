version: '3.8'

services:
  vectordb:
    image: chromadb/chroma:latest
    ports:
      - '8000:8000'
    volumes:
      - chroma_data:/chroma/chroma

  llm:
    build: ./llm
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama

  host:
    build: ./host
    ports:
      - '5003:5000'
    depends_on:
      - llm
      - mcpserver
      - vectordb
    environment:
      - LLM_URL=http://llm:11434
      - MCP_URL=http://mcpserver:5001
      - VECTOR_DB_URL=http://vectordb:8000

  mcpserver:
    build: ./mcpserver
    ports:
      - '5001:5001'
    depends_on:
      - vectordb
      - filebucket
      - llm
    environment:
      - VECTOR_DB_URL=http://vectordb:8000
      - LLM_URL=http://llm:11434

  filebucket:
    build: ./filebucket
    ports:
      - '5002:5002'
    depends_on:
      - llm
      - vectordb
    volumes:
      - file_data:/app/files
    environment:
      - LLM_URL=http://llm:11434
      - VECTOR_DB_URL=http://vectordb:8000

volumes:
  chroma_data:
  ollama_data:
  file_data:
